name: Build and release

on:
  # Dev
  workflow_dispatch:
  pull_request:
  push:
    # Preview
    branches: [ master ]
    # Stable
    tags: [ "v*" ]

env:
  DOTNET_VERSIONS: |
    8.0.420
    10.0.202
  DOTNET_INSTALL_DIR: '/tmp/dotnet/'

jobs:
  build:
    name: "Build"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # We need full history for version number

      - name: "Setup .NET SDK"
        id: "dotnet-install"
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSIONS }}

      - name: "Build, test, and bundle"
        run: >
          dotnet run build.cs --
          --target=Default
          --target=Bundle
          --dotnet-configuration=Release

      - name: "Publish artifacts to CI"
        uses: actions/upload-artifact@v7
        with:
          name: "Artifacts"
          retention-days: 7
          path: |
            build/artifacts/
            !build/artifacts/docs

      - name: Publish docs artifact to CI
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/artifacts/docs

  upload_doc:
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
    name: "Documentation"
    needs: build
    runs-on: "ubuntu-latest"
    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source
    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
